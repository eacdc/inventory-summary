<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Summary Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Inventory Summary Tool</h1>
      <p>Itemwise and clientwise stock summary.</p>
    </header>

    <main>
      <section class="panel">
        <div class="tabs">
          <button type="button" id="tab-itemwise" class="tab active">Itemwise</button>
          <button type="button" id="tab-clientwise" class="tab">Clientwise</button>
        </div>

        <div class="toolbar">
          <label>
            Database
            <select id="database">
              <option value="KOL">KOL</option>
              <option value="AHM">AHM</option>
            </select>
          </label>
          <label>
            From Date
            <input id="from-date" type="date">
          </label>
          <label>
            To Date
            <input id="to-date" type="date">
          </label>
          <button id="btn-load" type="button">Load Summary</button>
        </div>

        <p id="status" class="status"></p>

        <div id="itemwise-panel">
          <div class="table-wrap table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="sticky-header" style="width: 54px;">View</th>
                  <th class="sticky-header">Item Group / Item</th>
                  <th class="sticky-header">Opening</th>
                  <th class="sticky-header">In</th>
                  <th class="sticky-header">Out</th>
                  <th class="sticky-header">Closing</th>
                </tr>
                <tr class="filter-row">
                  <th class="sticky-filter"></th>
                  <th class="sticky-filter"><input type="search" id="filter-itemwise-label" class="filter-input filter-text" placeholder="Filter…" autocomplete="off"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-itemwise-opening" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-itemwise-in" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-itemwise-out" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-itemwise-closing" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="6" class="empty">Load to view inventory summary.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="clientwise-panel" class="hidden">
          <div class="table-wrap table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="sticky-header" style="width: 54px;">View</th>
                  <th class="sticky-header">Client / Item</th>
                  <th class="sticky-header">Opening</th>
                  <th class="sticky-header">Receipt</th>
                  <th class="sticky-header">Issue</th>
                  <th class="sticky-header">Closing</th>
                </tr>
                <tr class="filter-row">
                  <th class="sticky-filter"></th>
                  <th class="sticky-filter"><input type="search" id="filter-client-label" class="filter-input filter-text" placeholder="Filter…" autocomplete="off"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-client-opening" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-client-receipt" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-client-issue" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                  <th class="sticky-filter"><input type="number" step="1" id="filter-client-closing" class="filter-input filter-num" placeholder="Min" inputmode="numeric"></th>
                </tr>
              </thead>
              <tbody id="client-table-body">
                <tr>
                  <td colspan="6" class="empty">Load to view clientwise stock movement.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
