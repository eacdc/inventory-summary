<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Summary Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Inventory Summary Tool</h1>
      <p>Itemwise and clientwise stock summary.</p>
    </header>

    <main>
      <section class="panel">
        <div class="tabs">
          <button type="button" id="tab-itemwise" class="tab active">Itemwise</button>
          <button type="button" id="tab-clientwise" class="tab">Clientwise</button>
        </div>

        <div class="toolbar">
          <label>
            Database
            <select id="database">
              <option value="KOL">KOL</option>
              <option value="AHM">AHM</option>
            </select>
          </label>
          <label>
            From Date
            <input id="from-date" type="date">
          </label>
          <label>
            To Date
            <input id="to-date" type="date">
          </label>
          <button id="btn-load" type="button">Load Summary</button>
        </div>

        <p id="status" class="status"></p>

        <div id="itemwise-panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 54px;">View</th>
                  <th>Item Group / Item</th>
                  <th>Opening</th>
                  <th>In</th>
                  <th>Out</th>
                  <th>Closing</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="6" class="empty">Load to view inventory summary.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="clientwise-panel" class="hidden">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 54px;">View</th>
                  <th>Client / Item</th>
                  <th>Opening</th>
                  <th>Receipt</th>
                  <th>Issue</th>
                  <th>Closing</th>
                </tr>
              </thead>
              <tbody id="client-table-body">
                <tr>
                  <td colspan="6" class="empty">Load to view clientwise stock movement.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
